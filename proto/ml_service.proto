edition = "2023";

package ml;

option go_package = "github.com/noedaka/clothing-visual-search/backend/internal/mlpb";

message ImageRequest {
    bytes image_data = 1;
    string image_format = 2;
}

message EmbeddingResponse {
    repeated float embedding = 1;
}

service MLService {
    rpc GetEmbedding (ImageRequest) returns (EmbeddingResponse);
}