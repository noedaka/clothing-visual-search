x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:15-alpine
    container_name: clothing-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-dbs:/docker-entrypoint-initdb.d
    networks:
      - clothing-network
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: clothing-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: '1000'
      ETCD_QUOTA_BACKEND_BYTES: '4294967296'
      ETCD_SNAPSHOT_COUNT: '50000'
    volumes:
      - etcd_data:/etcd
    networks:
      - clothing-network
    command: >
      etcd
        --data-dir /etcd
        --listen-client-urls http://0.0.0.0:2379
        --advertise-client-urls http://0.0.0.0:2379
        --listen-peer-urls http://0.0.0.0:2380
        --initial-advertise-peer-urls http://0.0.0.0:2380
        --initial-cluster default=http://0.0.0.0:2380
        --initial-cluster-token etcd-cluster
        --initial-cluster-state new
    logging: *default-logging

  minio:
    image: minio/minio:latest
    container_name: clothing-minio
    restart: unless-stopped
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - clothing-network
    command: server /data --console-address ":9001"
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    image: milvusdb/milvus:latest
    container_name: clothing-milvus
    restart: unless-stopped
    ports:
      - "${MILVUS_PORT}:19530"
      - "9091:9091"
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    networks:
      - clothing-network
    depends_on:
      - etcd
      - minio
    logging: *default-logging
    command: ["milvus", "run", "standalone"]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clothing-backend
    restart: unless-stopped
    ports:
      - "${GO_PORT}:${GO_PORT}"
    environment:
      GO_PORT: ${GO_PORT}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=disable
      GRPC_ML_SERVICE_ADDR: ${GRPC_ML_SERVICE_ADDR}
      MINIO_ENDPOINT: minio:${MINIO_PORT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_EXTERNAL_URL: http://localhost:${MINIO_PORT}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MILVUS_ENDPOINT: milvus:${MILVUS_PORT}
      MILVUS_HOST: milvus
      MILVUS_PORT: ${MILVUS_PORT}
    networks:
      - clothing-network
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      milvus:
        condition: service_started
    logging: *default-logging

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: clothing-ml-service
    restart: unless-stopped
    ports:
      - "${PYTHON_PORT}:${PYTHON_PORT}"
    environment:
      PYTHON_PORT: ${PYTHON_PORT}
      ML_MODEL_NAME: ${ML_MODEL_NAME}
      MILVUS_HOST: milvus
      MILVUS_PORT: ${MILVUS_PORT}
    networks:
      - clothing-network
    depends_on:
      - milvus
    logging: *default-logging

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clothing-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - clothing-network
    depends_on:
      - backend
    logging: *default-logging

volumes:
  postgres_data:
  milvus_data:
  etcd_data:
  minio_data:

networks:
  clothing-network:
    driver: bridge